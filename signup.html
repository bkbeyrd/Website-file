<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - Tax Solution</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0c2b5a,#163d79);
      padding:20px;
    }

    .signup-box{
      width:100%;
      max-width:400px;
      background:#fff;
      padding:30px 25px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.25);
      text-align:center;
    }

    .logo{
      width:85px;
      height:85px;
      border:4px solid #0c2b5a;
      border-radius:50%;
      margin:0 auto 15px;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:34px;
      font-weight:bold;
      color:#f2b400;
    }

    h1{
      color:#0c2b5a;
      margin-bottom:8px;
    }

    h1 span{
      color:#f2b400;
    }

    .sub{
      color:#666;
      font-size:14px;
      margin-bottom:22px;
    }

    .input-box{
      text-align:left;
      margin-bottom:16px;
    }

    .input-box label{
      display:block;
      margin-bottom:6px;
      font-weight:bold;
      color:#0c2b5a;
    }

    .input-box input{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:10px;
      outline:none;
      font-size:15px;
    }

    .input-box input:focus{
      border-color:#0c2b5a;
    }

    button{
      width:100%;
      padding:13px;
      background:#f2b400;
      color:#111;
      border:none;
      border-radius:10px;
      font-size:17px;
      font-weight:bold;
      cursor:pointer;
      margin-top:5px;
    }

    button:hover{
      background:#dca400;
    }

    .links{
      margin-top:18px;
      font-size:14px;
    }

    .links a{
      color:#0c2b5a;
      text-decoration:none;
      font-weight:bold;
    }
  </style>
</head>
<body>

  <div class="signup-box">
    <div class="logo">TS</div>
    <h1>TAX <span>SOLUTION</span></h1>
    <p class="sub">Create your account</p>

    <div class="input-box">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="Enter your full name">
    </div>

    <div class="input-box">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email">
    </div>

    <div class="input-box">
      <label for="mobile">Mobile Number</label>
      <input type="tel" id="mobile" placeholder="Enter your mobile number">
    </div>

    <div class="input-box">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Create password">
    </div>

    <div class="input-box">
      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm password">
    </div>

    <button onclick="signup()">Sign Up</button>

    <div class="links">
      <p>Already have an account? <a href="index.html">Login</a></p>
    </div>
  </div>

  <script>
    function signup(){
      let name = document.getElementById("name").value;
      let email = document.getElementById("email").value;
      let mobile = document.getElementById("mobile").value;
      let password = document.getElementById("password").value;
      let confirmPassword = document.getElementById("confirmPassword").value;

      if(name === "" || email === "" || mobile === "" || password === "" || confirmPassword === ""){
        alert("Please fill all fields");
      }
      else if(password !== confirmPassword){
        alert("Password and Confirm Password do not match");
      }
      else{
        alert("Signup successful");
        window.location.href = "index.html";
      }
    }
  </script>

</body>
</html>
