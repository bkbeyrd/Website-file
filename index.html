<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome | TrustEdge Infotech Services </title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg, #071d36, #0f2d52);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    .container{
      max-width:720px;
      background:rgba(255,255,255,0.08);
      padding:45px 30px;
      border-radius:18px;
      box-shadow:0 15px 40px rgba(0,0,0,0.25);
      border:5px solid rgba(255,255,255,0.15);
    }

   .logo img{
      width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #0b2d55;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  width:80px;
  height:80px;
  border-radius:50%;      /* circle banane ke liye */
  object-fit:cover;       /* image cut na ho */
  border:3px solid #0b2d55; /* optional border */
}

    h1{
      font-size:38px;
      margin-bottom:12px;
      line-height:1.2;
    }

    h1 span{
      color:#1E73E8;
    }

    p{
      font-size:18px;
      line-height:1.6;
      color:#e8eef7;
      margin-bottom:28px;
    }

    .btn{
      display:inline-block;
      padding:15px 34px;
      background:#1E73E8;
      color:#071d36;
      text-decoration:none;
      border-radius:8px;
      font-size:18px;
      font-weight:bold;
      box-shadow:0 8px 20px rgba(255,193,7,0.35);
    }

    .btn:hover{
      background:white;
    }

    .trust{
      margin-top:25px;
      font-size:14px;
      color:#cfd8e6;
    }

    @media(max-width:600px){
      .container{
        padding:35px 22px;
      }

      h1{
        font-size:30px;
      }

      p{
        font-size:16px;
      }

      .btn{
        font-size:16px;
        padding:13px 25px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
<div class="logo">
  <img src="photos/trustedge.png" alt="logo">
</div>

    <h1>Welcome To</h1>
    <h1><span>(TrustEdge Infotech)</span></h1>

    <p>
      We provide Business Website Development, Digital services, online form setup, Payment Gateway Setup For Business,  WhatsApp integration and hosting support for your business.
    </p>

    <a href="home.html" class="btn">
    ⭐ Explore Website ⭐ 
    </a>

    <div class="trust">
      Trusted Digital & Website Development Service
    </div>
  </div>

</body>
</html>
