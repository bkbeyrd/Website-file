<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tax Solution - Login</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0c2b5a,#163d79);
      padding:20px;
    }

    .login-box{
      width:100%;
      max-width:380px;
      background:#fff;
      padding:30px 25px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.25);
      text-align:center;
    }

    .logo{
      width:90px;
      height:90px;
      border:4px solid #0c2b5a;
      border-radius:50%;
      margin:0 auto 15px;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:38px;
      font-weight:bold;
      color:#f2b400;
    }

    h1{
      color:#0c2b5a;
      margin-bottom:8px;
    }

    h1 span{
      color:#f2b400;
    }

    .sub{
      color:#666;
      margin-bottom:25px;
      font-size:14px;
    }

    .input-box{
      text-align:left;
      margin-bottom:18px;
    }

    .input-box label{
      display:block;
      margin-bottom:6px;
      font-weight:bold;
      color:#0c2b5a;
    }

    .input-box input{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:10px;
      outline:none;
      font-size:15px;
    }

    .input-box input:focus{
      border-color:#0c2b5a;
    }

    button{
      width:100%;
      padding:13px;
      background:#f2b400;
      color:#111;
      border:none;
      border-radius:10px;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      background:#dca400;
    }

    .links{
      margin-top:18px;
      font-size:14px;
    }

    .links a{
      color:#0c2b5a;
      text-decoration:none;
      font-weight:bold;
    }

    .links p{
      margin-top:8px;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="logo">TS</div>
    <h1>TAX <span>SOLUTION</span></h1>
    <p class="sub">Login to continue</p>

    <div class="input-box">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email">
    </div>

    <div class="input-box">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>

    <button onclick="login()">Login</button>

    <div class="links">
      <a href="Forget.html">Forgot Password?</a>
      <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>
  </div>

  <script>
    function login(){
      let email = document.getElementById("email").value;
      let password = document.getElementById("password").value;

      if(email === "" || password === ""){
        alert("Please fill all fields");
      } else {
        window.location.href = "home.html";
      }
    }
  </script>

</body>
</html>
