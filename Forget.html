<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Tax Solution</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0c2b5a,#163d79);
    }

    .box{
      width:90%;
      max-width:380px;
      background:#fff;
      padding:30px 25px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .logo{
      width:80px;
      height:80px;
      border:4px solid #0c2b5a;
      border-radius:50%;
      margin:0 auto 15px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:32px;
      font-weight:bold;
      color:#f2b400;
    }

    h2{
      color:#0c2b5a;
      margin-bottom:10px;
    }

    p{
      color:#666;
      font-size:14px;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:18px;
      border:1px solid #ccc;
      border-radius:10px;
      outline:none;
    }

    input:focus{
      border-color:#0c2b5a;
    }

    button{
      width:100%;
      padding:13px;
      background:#f2b400;
      border:none;
      border-radius:10px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      background:#dca400;
    }

    .back{
      margin-top:15px;
    }

    .back a{
      text-decoration:none;
      color:#0c2b5a;
      font-weight:bold;
    }

  </style>
</head>
<body>

  <div class="box">
    <div class="logo">TS</div>

    <h2>Forgot Password</h2>
    <p>Enter your email to reset your password</p>

    <input type="email" id="email" placeholder="Enter your email">

    <button onclick="reset()">Reset Password</button>

    <div class="back">
      <a href="index.html">⬅ Back to Login</a>
    </div>
  </div>

  <script>
    function reset(){
      let email = document.getElementById("email").value;

      if(email === ""){
        alert("Please enter your email");
      } else {
        alert("Password reset link sent to your email (Demo)");
        window.location.href = "index.html";
      }
    }
  </script>

</body>
</html>
